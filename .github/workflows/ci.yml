name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  package:
    name: Maven Package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Package
        run: mvn --batch-mode package
