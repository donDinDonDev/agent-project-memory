name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  package:
    name: Maven Package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Package
        run: mvn --batch-mode package
